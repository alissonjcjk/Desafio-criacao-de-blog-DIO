<app-menu-title></app-menu-title>

<!-- Eu uso ngModel + (ngModelChange) para reagir à digitação sem um FormGroup completo neste protótipo. -->
<section class="home__filters" aria-label="Filtros da listagem">
  <label class="home__filter">
    <span>Buscar</span>
    <input
      type="search"
      name="q"
      [(ngModel)]="search"
      (ngModelChange)="applyFilters()"
      placeholder="Título, descrição ou tag…"
      autocomplete="off"
    />
  </label>
  <label class="home__filter">
    <span>Categoria</span>
    <select
      name="category"
      [(ngModel)]="category"
      (ngModelChange)="applyFilters()"
    >
      <option *ngFor="let c of categories" [value]="c">
        {{ c === 'all' ? 'Todas' : c }}
      </option>
    </select>
  </label>
</section>

<p *ngIf="loading" class="home__state" role="status">Carregando posts…</p>
<p *ngIf="!loading && !featured" class="home__state">Nenhum artigo disponível.</p>

<div class="container__articles" *ngIf="!loading && featured">
  <div class="articles__main">
    <app-big-card
      [Id]="featured.id"
      [photoCover]="featured.photoCover"
      [cardTitle]="featured.title"
      [cardDescription]="featured.description"
      [imageAlt]="'Capa do destaque: ' + featured.title"
    >
    </app-big-card>
  </div>
  <div class="articles__others">
    <app-small-card
      *ngFor="let item of listArticles"
      [Id]="item.id"
      [photoCover]="item.photoCover"
      [cardTitle]="item.title"
      [imageAlt]="'Miniatura: ' + item.title"
    >
    </app-small-card>
    <p *ngIf="listArticles.length === 0" class="home__empty">
      Nenhum outro artigo corresponde aos filtros.
    </p>
  </div>
</div>
